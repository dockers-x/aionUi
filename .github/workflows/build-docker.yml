name: Build and Push AionUI Web Docker Image

on:
  # Check for new upstream releases every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Allow manual trigger with optional version override
  workflow_dispatch:
    inputs:
      version:
        description: "Force a specific version (e.g. 2.1.2). Leave empty to auto-detect latest."
        required: false
        default: ""

env:
  IMAGE_NAME: aionui-web
  UPSTREAM_REPO: iOfficeAI/AionUi

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Fetch latest upstream release version from GitHub API ─────────────
      - name: Get latest upstream version
        id: upstream
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually specified version: ${VERSION}"
          else
            VERSION=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest" \
              | jq -r '.tag_name' | sed 's/^v//')
            echo "Latest upstream version: ${VERSION}"
          fi

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to resolve version" && exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── 2. Check if this version already exists on Docker Hub ────────────────
      - name: Check if image already exists on Docker Hub
        id: check
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${USERNAME}/${{ env.IMAGE_NAME }}/tags/${VERSION}/")
          if [ "$STATUS" = "200" ]; then
            echo "Image ${USERNAME}/${{ env.IMAGE_NAME }}:${VERSION} already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${VERSION} detected — proceeding with build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Verify both arch release assets exist before building ─────────────
      - name: Verify release assets exist
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          for ARCH in x86_64 aarch64; do
            URL="https://github.com/${{ env.UPSTREAM_REPO }}/releases/download/v${VERSION}/aionui-web-${VERSION}-linux-${ARCH}.tar.gz"
            STATUS=$(curl -fsSL -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              --head "$URL")
            if [ "$STATUS" != "302" ] && [ "$STATUS" != "200" ]; then
              echo "Asset not found: ${URL} (HTTP ${STATUS})" && exit 1
            fi
            echo "Found: ${URL}"
          done

      # ── 4. Checkout repo (needs Dockerfile) ──────────────────────────────────
      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      # ── 5. Set up QEMU (required for arm64 emulation on amd64 runner) ────────
      - name: Set up QEMU
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      # ── 6. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      # ── 7. Log in to Docker Hub ───────────────────────────────────────────────
      - name: Log in to Docker Hub
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 8. Extract Docker metadata ────────────────────────────────────────────
      - name: Extract Docker metadata
        if: steps.check.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.upstream.outputs.version }}
            type=raw,value=latest

      # ── 9. Build and push multi-arch image ────────────────────────────────────
      # The Dockerfile downloads the correct tarball at build time using
      # TARGETARCH (amd64 -> linux-x86_64, arm64 -> linux-aarch64)
      - name: Build and push Docker image (amd64 + arm64)
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.upstream.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 10. Summary ───────────────────────────────────────────────────────────
      - name: Job summary
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "## ✅ Build successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Upstream version** | \`${{ steps.upstream.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest tag** | \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY

      - name: Skipped summary
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "## ⏭️ Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version \`${{ steps.upstream.outputs.version }}\` already exists on Docker Hub." >> $GITHUB_STEP_SUMMARY
